    <!-- sw.js: クロスオリジン隔離 (COOP/COEP) の注入 + アプリシェルキャッシュ (PWA)。
         GitHub Pages はヘッダ設定不可のため、COI は SW でヘッダを付与して有効化する
         (coi-serviceworker 方式を統合)。COEP は credentialless にして HF/CDN/フォント等の
         外部リソース取得を維持。これで WASM マルチスレッドが使える (WebGPU は元々不要)。
         初回訪問のみ、SW が制御を得た時点で 1 度だけリロードして isolation を反映する。 -->
    <script>
      (() => {
        const sw = navigator.serviceWorker;
        if (!sw || !window.isSecureContext) return;
        if (sw.controller) sw.controller.postMessage({ type: "coepCredentialless", value: true });
        let reloaded = false;
        sw.addEventListener("controllerchange", () => {
          if (reloaded || window.crossOriginIsolated) return;
          reloaded = true;
          window.location.reload();
        });
        sw.register("sw.js").catch(() => {});
      })();
    </script>
